    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #020617;
            height: 100%;
            /* 移除 overflow: hidden 以支援手機版捲動，但在 App.tsx 中會針對桌面版鎖定 */
        }
        
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0px 1000px #1e293b inset;
            -webkit-text-fill-color: white;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 20px; border: 2px solid transparent; background-clip: content-box; }
    </style>
